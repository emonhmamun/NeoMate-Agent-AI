# NeoMate AI Conda Environment Configuration
# This file defines a reproducible and isolated environment for development and deployment.
# It is designed to be compatible with the project's Python version and dependencies.
# The conda-forge channel is prioritized for access to the latest community-maintained packages.
# pip is included to allow installation of packages not available via Conda.
# The structure is clean, professional, and easy to maintain for future updates.

name: neomate_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
