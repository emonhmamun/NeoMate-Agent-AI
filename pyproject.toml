# NeoMate AI - pyproject.toml
# This file configures the Python project using Poetry and PEP 621 standards.
# It defines project metadata, dependencies, and build system for reliable package management.

[project]
name = "neomate-ai"
version = "0.1.0"
description = "Your personal, autonomous desktop AI assistant that can see, hear, and act."
authors = [{name = "Emon H Mamun", email = "emon@example.com"}]
license = "MIT"
readme = "README.md"
requires-python = ">=3.10"
keywords = ["ai", "assistant", "desktop", "automation", "voice", "vision", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/emonhmamun/NeoMate-Agent-AI"
Repository = "https://github.com/emonhmamun/NeoMate-Agent-AI"
Documentation = "https://github.com/emonhmamun/NeoMate-Agent-AI/blob/main/docs/"
Issues = "https://github.com/emonhmamun/NeoMate-Agent-AI/issues"

[tool.poetry]
packages = [{include = "src"}]

[tool.poetry.group.dev.dependencies]
pytest = "^7.0"
pytest-cov = "^4.0"
black = "^23.0"
flake8 = "^6.0"
mypy = "^1.0"
isort = "^5.12"
pre-commit = "^3.0"
ruff = "^0.1"

[tool.poetry.group.docs.dependencies]
sphinx = "^7.0"
sphinx-rtd-theme = "^1.3"

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["src"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.ruff]
line-length = 88
target-version = "py310"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long, handled by black
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
